headline: Argument Parser로 간단한 CLI 도구 만들기
paragraphs:
  - 'Swift Argument Parser 라이브러리를 사용하여 완전한 기능의 커맨드 라인 인터페이스를 빠르게 구축할 수 있습니다. 일반 Swift 프로퍼티를 가진 타입을 만들어 커맨드를 정의하고, 여러 커맨드를 연결하여 풍부한 커맨드 계층을 구성하세요.'
  - 'ArgumentParser는 상세한 도움말 화면, 유사 입력 검사가 포함된 명확한 오류 메시지, 광범위한 커스터마이제이션 등을 제공합니다.'
link:
  text: Swift Argument Parser
  url: https://github.com/apple/swift-argument-parser
code: |-
  import ArgumentParser
  @main
  struct Repeat: ParsableCommand {
    @Argument(help: "The phrase to repeat.")
    var phrase: String
    
    @Option(help: "The number of times to repeat 'phrase'.")
    var count: Int? = nil
    
    mutating func run() throws {
      let repeatCount = count ?? .max
      
      for i in 1...repeatCount {
        print(phrase)
      }
    }
  }
