headline: 네이티브 컨테이너 빌드 및 배포
body: 컨테이너 이미지는 오늘날 클라우드 소프트웨어를 패키징하는 표준 방식입니다. 서버를 컨테이너 이미지로 패키징하면, 컨테이너 기반의 퍼블릭 또는 프라이빗 클라우드 서비스에 배포하거나 데스크톱 컨테이너 런타임을 사용해 로컬에서 실행할 수 있습니다. <br /><br /> Swift Container Plugin을 사용하면 Swift Package Manager로 Swift 서비스의 컨테이너 이미지를 하나의 간소화된 워크플로에서 빌드하고 배포할 수 있습니다.
link:
  href: 'https://github.com/apple/swift-container-plugin'
  copy: Swift Container Plugin