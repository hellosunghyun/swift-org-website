headline: Swift로 클라우드 서비스 만들기
body: Linux에서 고성능 서비스를 실행하고 클라우드에 배포하세요
link:
  url: "https://docs.swift.org/getting-started-swift-server/tutorials/getting-started-swift-server/"
  text: 시작하기
boxes:
  - title: 고성능
    text: 뛰어난 메모리 효율성을 갖춘 Swift는 가비지 컬렉터 없이 동작하며, 더 적은 리소스를 사용하면서 예측 가능한 속도로 실행됩니다.
  - title: 경량
    text: Swift는 워밍업 작업이 최소화되어 있어, 가상 머신과 컨테이너에 자주 재배치되는 클라우드 서비스 운영에 이상적입니다.
  - title: 확장 가능
    text: 하루에 수십억 건의 요청을 처리하는 인터넷 규모의 클라우드 서비스를 구동하며, Swift는 대규모 프로덕션 워크로드를 실행할 수 있습니다.