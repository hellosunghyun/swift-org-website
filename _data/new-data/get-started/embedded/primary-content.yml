title: 예제 프로젝트 살펴보기
primary_cards:
  - name: Harmony Bluetooth Speaker
    logo: /assets/images/get-started/harmony-bluetooth-speaker@2x.png
    logo_alt: Harmony
    text: Raspberry Pi Pico W를 사용하여 자성유체 비주얼라이저가 있는 Bluetooth 스피커를 만들어 보세요.
    link_text: 더 알아보기
    link: https://github.com/swiftlang/swift-embedded-examples/tree/main/harmony

  - name: Matter and HomeKit Smart Light
    logo: /assets/images/get-started/matter-homeKit-smartlight@2x.png
    logo_alt: Matter and HomeKit Smart Light
    text: ESP32 마이크로컨트롤러를 사용하여 HomeKit에서 사용할 수 있는 Matter 스마트 조명 액세서리를 구현합니다.
    link: https://github.com/swiftlang/swift-matter-examples
    link_text: 더 알아보기

secondary_cards:
  - name: Interactive UI Examples
    logo_alt:
    logo: /assets/images/get-started/interactive-ui-examples@2x.png
    text: STM32 보드에서 인기 있는 임베디드 그래픽 라이브러리 LVGL을 사용하여 풍부한 UI와 터치 입력이 있는 프로젝트를 만들어 보세요.
    link_text: 더 알아보기
    link: https://github.com/swiftlang/swift-embedded-examples/tree/main/stm32-lvgl

  - name: PlaydateKit
    logo: /assets/images/get-started/playdate-kit@2x.png
    logo_alt: PlaydateKit
    text: Playdate 게임 콘솔을 위한 사용하기 쉬운 Swift 바인딩을 제공하는 PlaydateKit으로 인터랙티브 게임을 만들어 보세요.
    link: https://github.com/finnvoor/PlaydateKit
    link_text: 더 알아보기

link:
  url: https://github.com/swiftlang/swift-embedded-examples
  text: GitHub에서 더 많은 Embedded Swift 예제와 템플릿 살펴보기
