- header: 개요
  pages:
  - title: 언어 레퍼런스
    url: /documentation/tspl/
    description: |
      The Swift Programming Language(TSPL)은 Swift의 공식 레퍼런스 도서로,
      가이드 투어, 종합 가이드, 언어의 공식 레퍼런스를 제공합니다.
  - title: API 디자인 가이드라인
    url: /documentation/api-design-guidelines/
    description: |
      Swift 코드를 작성할 때 명확하고 일관된 개발자 경험을 제공하는 것은 API에 사용되는 이름과 관용구에 의해 크게 결정됩니다.
      이 디자인 가이드라인은 여러분의 코드가 Swift 생태계의 일부처럼 느껴지도록 하는 방법을 설명합니다.
  - title: 표준 라이브러리
    url: /documentation/standard-library/
    description: |
      Swift 표준 라이브러리는 Swift 프로그램을 작성하기 위한 기본 기능 계층을 정의합니다.
  - title: 코어 라이브러리
    url: /documentation/core-libraries/
    description: |
      Swift 코어 라이브러리 프로젝트는 Swift 표준 라이브러리보다 높은 수준의 기능을 제공합니다.
      이 라이브러리들은 Swift가 지원하는 모든 플랫폼에서 개발자가 활용할 수 있는 강력한 도구를 제공합니다.
  - title: 패키지 매니저
    url: /documentation/package-manager/
    description: |
      Swift 패키지 매니저는 Swift 코드 "패키지"의 배포와 사용을 관리하는 도구입니다.
      Swift 빌드 시스템과 통합되어 의존성의 다운로드, 컴파일, 링킹 과정을 자동화합니다.
  - title: REPL 및 디버거
    url: /documentation/lldb/
    description: |
      LLDB 디버거는 Swift 언어를 위한 풍부한 REPL과 디버깅 환경을 제공합니다.
  - title: Swift 소개
    url: /about/
    description: |
      Swift의 핵심 기능, 지원 플랫폼, 오픈 소스 프로젝트에 대한 요약입니다.
#----------------------------------------------------
- header: 문서
  pages:
  - title: 서버에서의 Swift
    url: /documentation/server/
    description: |
      Swift는 서버 애플리케이션에 특히 적합한 고유한 특성을 가진 범용 프로그래밍 언어입니다.
  - title: Swift와 C++ 혼합 사용
    url: /documentation/cxx-interop/
    description: |
      Swift는 C++과의 양방향 상호 운용성을 지원합니다.
      다양한 C++ API를 Swift에서 직접 호출할 수 있으며, 일부 Swift API는 C++에서 사용할 수 있습니다.
  - title: 값 타입과 참조 타입
    url: /documentation/articles/value-and-reference-types.html
    description: |
      Swift의 타입은 값 타입과 참조 타입, 두 가지 범주로 나뉩니다.
      각각 다르게 동작하며, 이 차이를 이해하는 것이 Swift를 이해하는 데 중요한 부분입니다.
  - title: DocC
    url: /documentation/docc/
    description: |
      DocC는 Swift 프레임워크와 패키지의 문서를 쉽게 작성할 수 있게 해주는 문서 컴파일러입니다.
      소스 코드에 작성한 주석과 패키지 소스 코드와 함께 있는 확장 파일, 문서, 튜토리얼을 결합하여 문서를 빌드합니다.
  - title: 완전한 동시성 검사 활성화
    url: /documentation/concurrency/
    description: |
        SwiftPM 패키지, Xcode 프로젝트, CI 스크립트에서 완전한 동시성 검사를 활성화하여 Swift 6에 대비하세요.
  - title: Static Linux SDK 시작하기
    url: /documentation/articles/static-linux-getting-started.html
    description: |
      시스템 의존성 없이(Swift 런타임이나 C 라이브러리조차 없이) Linux용 바이너리를 빌드하는 방법을 알아보세요.
      Swift 툴체인이 있는 모든 시스템에서 이 작업을 할 수 있어, macOS나 Windows에서 개발하고 프로덕션 배포 시 Linux에 쉽게 배포할 수 있습니다.
  - title: Android용 Swift SDK 시작하기
    url: /documentation/articles/swift-sdk-for-android-getting-started.html
    description: |
      Android용 Swift 패키지 크로스 컴파일을 시작하는 방법을 알아보세요.
  - title: WebAssembly용 Swift SDK 시작하기
    url: /documentation/articles/wasm-getting-started.html
    description: |
      WebAssembly(Wasm)용 Swift 패키지 빌드를 시작하는 방법을 알아보세요.
  - title: VS Code에서 Swift 시작하기
    url: /documentation/articles/getting-started-with-vscode-swift.html
    description: |
      VS Code용 Swift 확장 프로그램을 시작하는 방법을 알아보세요.
#----------------------------------------------------
- header: 기여하기
  pages:
  - title: Swift Evolution
    url: /swift-evolution/
    description: |
      Swift Evolution은 Swift 언어에 변경 사항이 도입되는 방식을 관리합니다.
      아이디어가 제안되고, 논의되고, 검토되어 최종적으로 다가오는 릴리스에 수용되는 과정을 상세히 설명합니다.
  - title: 소스 코드
    url: /documentation/source-code/
    description: |
      Swift 프로젝트의 코드는 여러 오픈 소스 저장소로 나뉘어 있으며, 모두 GitHub.com에서 호스팅됩니다.
  - title: 지속적 통합
    url: /documentation/continuous-integration/
    description: |
      Swift.org CI 시스템은 swift.org에 게시되는 스냅샷 빌드를 생성하고, 활성 브랜치에 대해 테스트를 실행합니다.
      풀 리퀘스트를 커밋하기 전에 테스트를 실행하는 리뷰 프로세스의 일부로도 사용됩니다.
  - title: 소스 호환성
    url: /documentation/source-compatibility/
    description: |
      소스 호환성 테스트 스위트는 Swift 소스 코드 모음을 빌드하여
      컴파일러의 회귀를 테스트하기 위해 설계된 커뮤니티 소유 리소스입니다.
  - title: 컴파일러 아키텍처
    url: /documentation/swift-compiler/
    description: |
      Swift 컴파일러 아키텍처의 개요입니다.
  - title: 월간 비 Darwin Swift 릴리스
    url: /documentation/monthly-non-darwin-release/
    description: |
      Swift 월간 비 Darwin 릴리스 프로세스의 개요입니다.
