<tr>
    <td class="download">
        <span class="release">
          <a href="https://download.swift.org/{{ include.branch_dir }}/{{ include.platform_dir }}/{{ include.build.dir }}/{{ include.build.download }}" title="다운로드" download>{{ include.build.date | date: '%B %-d, %Y' }}</a>
          {% if include.build.download_signature %}
            <a href="https://download.swift.org/{{ include.branch_dir }}/{{ include.platform_dir }}/{{ include.build.dir }}/{{ include.build.download_signature }}" title="PGP 서명" class="signature">서명</a>
          {% endif %}
          {% if include.build.debug_info %}
            <a href="https://download.swift.org/{{ include.branch_dir }}/{{ include.platform_dir }}/{{ include.build.dir }}/{{ include.build.debug_info }}" title="디버깅 심볼" class="debug">디버깅 심볼</a>
          {% if include.build.debug_info_signature %}
            <a href="https://download.swift.org/{{ include.branch_dir }}/{{ include.platform_dir }}/{{ include.build.dir }}/{{ include.build.debug_info_signature }}" title="디버깅 심볼용 PGP 서명">서명</a>
          {% endif %}
          {% endif %}
        </span>
    </td>
</tr>
